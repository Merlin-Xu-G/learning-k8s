apiVersion: v1
kind: Pod
metadata:
  name: task-pv-pod
spec:
  volumes:
    - name: task-pv-storage
      persistentVolumeClaim:
        claimName: task-pv-claim
  containers:
    - name: task-pv-container
      image: nginx
      ports:
        - containerPort: 80
          name: "alpine"
          image: alpine:3
          command:
            - /bin/sh
            - -c
            - echo 'Hello from Kubernetes storage' > /usr/share/nginx/html/index.html
      volumeMounts:
        - mountPath: "/usr/share/nginx/html"
          name: task-pv-storage



